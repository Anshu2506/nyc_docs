stages:
  make_dataset:
    cmd: python ./src/data/make_dataset.py ./data/raw/Nyc_taxi_fare.csv
    deps:
    - ./src/data/make_dataset.py
    - ./data/raw/Nyc_taxi_fare.csv
    outs:
    - ./data/processed
    

  build_features:
    cmd: python ./src/features/build_features.py ./data/interim/train.csv ./data/interim/test.csv
    deps:
    - ./src/features/build_features.py
    - ./data/interim/train.csv
    - ./data/interim/test.csv

    outs:
    - ./data/external

  preprocess:
    cmd: python ./src/data/preprocess.py ./data/processed/train.csv ./data/processed/test.csv
    deps:
    - ./src/data/preprocess.py
    - ./data/processed/train.csv
    - ./data/processed/test.csv
    outs:
    - ./data/interim

  train_model:
    cmd: python ./src/models/train_model.py ./data/external/x_train.csv ./data/external/x_test.csv ./data/external/y_train.csv ./data/external/y_test.csv
    deps:
    - ./src/models/train_model.py
    - ./data/external/x_train.csv
    - ./data/external/x_test.csv
    - ./data/external/y_train.csv
    - ./data/external/y_test.csv

    outs:
    - ./models_matrix/best_model.pkl

  evaluate_model:
    cmd: python ./src/models/evaluate_model.py ./data/external/x_test.csv ./data/external/y_test.csv ./models_matrix/best_model.pkl
    deps:
    - ./data/external/x_test.csv 
    - ./data/external/y_test.csv
    - ./models_matrix/best_model.pkl

    outs:
    - ./reports/metrics.json

  predict_model:
    cmd: python ./src/models/predict_model.py ./data/external/x_test.csv ./models_matrix/best_model.pkl
    deps:
    - ./src/models/predict_model.py 
    - ./data/external/x_test.csv
    - ./models_matrix/best_model.pkl
    outs:
    - ./predictions/predictions.csv
