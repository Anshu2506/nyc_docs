name: NYC Taxi Full CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build-train-deploy:

    runs-on: ubuntu-latest


    steps:

    # ==========================================
    # CHECKOUT CODE
    # ==========================================
    - name: Checkout Repository
      uses: actions/checkout@v4


    # ==========================================
    # SETUP PYTHON
    # ==========================================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    # ==========================================
    # INSTALL DEPENDENCIES
    # ==========================================
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-api.txt


    # ==========================================
    # INSTALL DVC + S3 SUPPORT
    # ==========================================
    - name: Install DVC
      run: |
        pip install "dvc[s3]"


    # ==========================================
    # CONFIGURE AWS CREDENTIALS
    # ==========================================
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.REGION }}


    # ==========================================
    # PULL DATA FROM DVC REMOTE
    # ==========================================
    - name: Pull Data From DVC Remote
      run: |
        dvc pull


    # ==========================================
    # RUN DVC PIPELINE
    # ==========================================
    - name: Run DVC Pipeline
      run: |
        dvc repro


    # ==========================================
    # PUSH UPDATED ARTIFACTS
    # ==========================================
    - name: Push Updated Artifacts
      run: |
        dvc push


    # ==========================================
    # LOGIN TO AMAZON ECR
    # ==========================================
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2


    # ==========================================
    # BUILD DOCKER IMAGE
    # ==========================================
    - name: Build Docker Image
      run: |
        docker build -t nyc-taxi-fare .


    # ==========================================
    # TAG DOCKER IMAGE
    # ==========================================
    - name: Tag Docker Image
      run: |
        docker tag nyc-taxi-fare:latest \
        ${{ secrets.ECR_URI }}/${{secrets.ECR_REPOSITORY}}:latest


    # ==========================================
    # PUSH IMAGE TO ECR
    # ==========================================
    - name: Push Docker Image To ECR
      run: |
        docker push \
        ${{ secrets.ECR_URI }}/${{secrets.ECR_REPOSITORY}}:latest


    # ==========================================
    # SUCCESS MESSAGE
    # ==========================================
    - name: Pipeline Success
      run: echo "CI/CD Pipeline Completed Successfully"